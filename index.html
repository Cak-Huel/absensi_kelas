<!DOCTYPE html>
<html lang="id" class="antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Absensi Kelas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f4f4f5', 100: '#e4e4e7', 200: '#d4d4d8', 300: '#a1a1aa',
                            400: '#71717a', 500: '#52525b', 600: '#3f3f46', 700: '#27272a',
                            800: '#18181b', 900: '#09090b',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .gradient-bg { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); }
        .dark .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .dark .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="gradient-bg min-h-screen flex items-center justify-center p-4 text-slate-800 dark:text-slate-200 transition-colors duration-300" x-data="{ darkMode: false }" :class="{ 'dark': darkMode }">

    <!-- Theme Toggle -->
    <button @click="darkMode = !darkMode" class="absolute top-4 right-4 p-2 rounded-full bg-white/50 dark:bg-black/20 hover:bg-white/80 dark:hover:bg-black/40 transition-all duration-300 backdrop-blur-md border border-white/20">
        <svg x-show="!darkMode" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-slate-800">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
        </svg>
        <svg x-show="darkMode" style="display: none;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-yellow-300">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
        </svg>
    </button>

    <div class="w-full max-w-md">
        <!-- Logo & Header -->
        <div class="text-center mb-8 transform hover:scale-105 transition-transform duration-300">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-brand-900 to-brand-600 text-white mb-4 shadow-xl shadow-brand-900/20">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">Sistem Absensi Sekolah</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">Masuk untuk mengakses layanan absensi</p>
        </div>

        <!-- Login Form -->
        <div class="glass-panel rounded-3xl p-8 shadow-2xl shadow-slate-200/50 dark:shadow-black/50" x-data="loginForm()">
            
            <form @submit.prevent="handleLogin" class="space-y-6">
                <!-- Error Message -->
                <div x-show="error" x-transition style="display: none;" class="bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 p-4 rounded-xl text-sm border border-red-100 dark:border-red-800/50 flex items-start gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 flex-shrink-0 mt-0.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    <span x-text="error"></span>
                </div>

                <!-- Info auto-detect -->
                <div class="bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300 p-3 rounded-xl text-xs border border-blue-100 dark:border-blue-800/50">
                    💡 Masukkan <strong>NISN</strong> (siswa) atau <strong>Username</strong> (guru/admin). Role akan terdeteksi otomatis.
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2" for="identifier">NISN / Username</label>
                    <input type="text" id="identifier" x-model="identifier"
                        class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all duration-200"
                        placeholder="Masukkan NISN atau Username" required>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2" for="password">Password</label>
                    <input type="password" id="password" x-model="password"
                        class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all duration-200"
                        placeholder="Masukkan password" required>
                </div>

                <button type="submit" :disabled="isLoading"
                    class="w-full py-3 px-4 bg-brand-900 hover:bg-brand-800 dark:bg-brand-100 dark:hover:bg-white text-white dark:text-brand-900 font-semibold rounded-xl transition-all duration-200 transform hover:translate-y-[-1px] hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-900 dark:focus:ring-offset-slate-900 flex justify-center items-center gap-2">
                    <span x-show="!isLoading">Masuk</span>
                    <span x-show="isLoading" style="display: none;">
                        <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-current inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Memproses...
                    </span>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-200 dark:border-slate-700/50">
                <div class="text-xs text-center text-slate-500 dark:text-slate-400 mb-4">Akun Demo</div>
                <div class="grid grid-cols-3 gap-3 text-xs">
                    <div class="bg-white/40 dark:bg-slate-800/40 p-3 rounded-lg border border-slate-200/50 dark:border-slate-700/50">
                        <div class="font-semibold text-blue-600 dark:text-blue-400 mb-1">Siswa</div>
                        <div>NISN: 12345</div>
                        <div>Pass: siswa123</div>
                    </div>
                    <div class="bg-white/40 dark:bg-slate-800/40 p-3 rounded-lg border border-slate-200/50 dark:border-slate-700/50">
                        <div class="font-semibold text-emerald-600 dark:text-emerald-400 mb-1">Guru</div>
                        <div>budisantoso</div>
                        <div>Pass: guru123</div>
                    </div>
                    <div class="bg-white/40 dark:bg-slate-800/40 p-3 rounded-lg border border-slate-200/50 dark:border-slate-700/50">
                        <div class="font-semibold text-purple-600 dark:text-purple-400 mb-1">Admin</div>
                        <div>admin</div>
                        <div>Pass: admin123</div>
                    </div>
                </div>
            </div>
        </div>
        
        <p class="text-center text-xs text-slate-500 dark:text-slate-500 mt-8">
            &copy; 2026 Sistem Absensi Sekolah. All rights reserved.
        </p>
    </div>

    <!-- Firebase Module -->
    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-auth.js";
        import { doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js";

        // Fungsi untuk menentukan role dari email Firebase Auth
        function getRoleFromEmail(email) {
            if (email.endsWith('@siswa.absensi.id')) return 'siswa';
            if (email.endsWith('@guru.absensi.id')) return 'guru';
            if (email.endsWith('@admin.absensi.id')) return 'admin';
            return null;
        }

        // Redirect berdasarkan role
        function redirectByRole(role) {
            const routes = {
                'siswa': 'pages/dashboard.html',
                'guru': 'pages/teacher_dashboard.html',
                'admin': 'pages/admin_dashboard.html'
            };
            if (routes[role]) window.location.href = routes[role];
        }

        // Cek jika sudah login → auto redirect
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const role = getRoleFromEmail(user.email);
                if (role) redirectByRole(role);
            }
        });

        // Auto-detect login: coba semua format email sampai berhasil
        window.firebaseAutoLogin = async function(identifier, password) {
            const emailFormats = [
                `${identifier}@siswa.absensi.id`,
                `${identifier}@guru.absensi.id`,
                `${identifier}@admin.absensi.id`
            ];

            for (const email of emailFormats) {
                try {
                    const cred = await signInWithEmailAndPassword(auth, email, password);
                    const role = getRoleFromEmail(email);

                    // Ambil data profil dari koleksi yang sesuai
                    let nama = identifier;
                    if (role === 'siswa') {
                        const siswaDoc = await getDoc(doc(db, 'siswa', cred.user.uid));
                        if (siswaDoc.exists()) nama = siswaDoc.data().nama_lengkap;
                    } else {
                        const userDoc = await getDoc(doc(db, 'users', cred.user.uid));
                        if (userDoc.exists()) nama = userDoc.data().nama;
                    }

                    // Simpan ke localStorage untuk akses cepat
                    localStorage.setItem('role', role);
                    localStorage.setItem('user_name', nama);
                    localStorage.setItem('user_uid', cred.user.uid);

                    return { role, nama };
                } catch (e) {
                    // Jika user-not-found atau invalid-credential, coba format berikutnya
                    if (e.code === 'auth/invalid-credential' || e.code === 'auth/user-not-found') {
                        continue;
                    }
                    // Error lain (terlalu banyak percobaan, network, dll) → langsung throw
                    throw e;
                }
            }

            // Semua format gagal
            throw { code: 'auth/invalid-credential' };
        };
    </script>

    <script>
        function loginForm() {
            return {
                identifier: '',
                password: '',
                error: '',
                isLoading: false,
                
                async handleLogin() {
                    this.error = '';
                    this.isLoading = true;

                    try {
                        const result = await window.firebaseAutoLogin(this.identifier, this.password);
                        
                        // Redirect berdasarkan role yang terdeteksi otomatis
                        const routes = {
                            'siswa': 'pages/dashboard.html',
                            'guru': 'pages/teacher_dashboard.html',
                            'admin': 'pages/admin_dashboard.html'
                        };
                        window.location.href = routes[result.role];

                    } catch (e) {
                        if (e.code === 'auth/invalid-credential' || e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password') {
                            this.error = 'NISN/Username atau password salah. Pastikan data sudah di-seed.';
                        } else if (e.code === 'auth/too-many-requests') {
                            this.error = 'Terlalu banyak percobaan gagal. Tunggu beberapa menit.';
                        } else {
                            this.error = e.message || 'Terjadi kesalahan saat login';
                        }
                        this.isLoading = false;
                    }
                }
            }
        }
    </script>
</body>

</html>
