<script>
    var lastIdKelas = <!-- variable kelas['id_kelas'] -->;
    var lastKelas = '<!-- variable kelas['kelas'] -->';

   $(document).ready(function() {
       getSiswa(lastIdKelas, lastKelas);
   });

   function getSiswa(idKelas, kelas) {
      var tanggal = $('#tanggal').val();

      jQuery.ajax({
         url: "/teacher/attendance/get-list",
         type: 'post',
         data: {
            'kelas': kelas,
            'id_kelas': idKelas,
            'tanggal': tanggal
         },
         success: function (response, status, xhr) {
            $('#dataSiswa').html(response);
         },
         error: function (xhr, status, thrown) {
            console.log(thrown);
            $('#dataSiswa').html(thrown);
         }
      });
      lastIdKelas = idKelas;
      lastKelas = kelas;
   }

   function getDataKehadiran(idPresensi, idSiswa) {
      jQuery.ajax({
         url: "/teacher/attendance/get-edit-modal",
         type: 'post',
         data: {
            'id_presensi': idPresensi,
            'id_siswa': idSiswa
         },
         success: function (response, status, xhr) {
            $('#modalFormUbahSiswa').html(response);
         },
         error: function (xhr, status, thrown) {
            console.log(thrown);
            $('#modalFormUbahSiswa').html(thrown);
         }
      });
   }

   function ubahKehadiran() {
      var tanggal = $('#tanggal').val();
      var form = $('#formUbah').serializeArray();

      form.push({
         name: 'tanggal',
         value: tanggal
      });

      jQuery.ajax({
         url: "/teacher/attendance/update-single",
         type: 'post',
         data: form,
         success: function (response, status, xhr) {
            if (response['status']) {
               getSiswa(lastIdKelas, lastKelas);
               alert('Berhasil ubah kehadiran : ' + response['nama_siswa']);
            } else {
               alert('Gagal ubah kehadiran : ' + response['nama_siswa']);
            }
         },
         error: function (xhr, status, thrown) {
            console.log(thrown);
            alert('Gagal ubah kehadiran\n' + thrown);
         }
      });
   }
</script>
