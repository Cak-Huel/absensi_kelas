    <!-- Firebase Auth Guard -->
    <script type="module">
        import { auth, db } from '../firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '../index.html';
                return;
            }
            // Verifikasi role admin dari email
            if (!user.email.endsWith('@admin.absensi.id')) {
                window.location.href = '../index.html';
                return;
            }
            // Ambil nama dari Firestore users
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.exists()) {
                localStorage.setItem('user_name', userDoc.data().nama);
                window.dispatchEvent(new CustomEvent('firebase-admin-ready', { detail: userDoc.data() }));
            }
        });

        window.firebaseLogout = async function() {
            await signOut(auth);
            localStorage.clear();
            window.location.href = '../index.html';
        };
    </script>

    <script>
        function adminDashboard() {
            return {
                isDark: false,
                sidebarOpen: window.innerWidth >= 768,
                userName: '',

                initDashboard() {
                    this.userName = localStorage.getItem('user_name') || 'Admin';

                    // Cek Theme
                    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                        this.isDark = true;
                        document.documentElement.classList.add('dark');
                    } else {
                        this.isDark = false;
                        document.documentElement.classList.remove('dark');
                    }

                    // Update nama ketika Firebase ready
                    window.addEventListener('firebase-admin-ready', (e) => {
                        this.userName = e.detail.nama || 'Admin';
                    });

                    // Init Charts
                    this.initCharts();
                },

                toggleTheme() {
                    this.isDark = !this.isDark;
                    if (this.isDark) {
                        document.documentElement.classList.add('dark');
                        localStorage.theme = 'dark';
                    } else {
                        document.documentElement.classList.remove('dark');
                        localStorage.theme = 'light';
                    }
                    if (window.siswaChartInstance) window.siswaChartInstance.update();
                    if (window.guruChartInstance) window.guruChartInstance.update();
                },

                logout() {
                    if (window.firebaseLogout) window.firebaseLogout();
                },

                initCharts() {
                    Chart.defaults.color = this.isDark ? '#94a3b8' : '#64748b';
                    Chart.defaults.font.family = 'Outfit, sans-serif';

                    const config = {
                        type: 'bar',
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'bottom' } },
                            scales: {
                                y: { beginAtZero: true, grid: { color: this.isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)' } },
                                x: { grid: { display: false } }
                            }
                        }
                    };

                    const ctxSiswa = document.getElementById('siswaChart').getContext('2d');
                    window.siswaChartInstance = new Chart(ctxSiswa, {
                        ...config,
                        data: {
                            labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum'],
                            datasets: [
                                { label: 'Hadir', data: [1200, 1210, 1195, 1220, 1180], backgroundColor: '#10b981' },
                                { label: 'Sakit/Izin', data: [30, 25, 40, 15, 50], backgroundColor: '#f59e0b' },
                                { label: 'Alfa', data: [15, 10, 10, 10, 15], backgroundColor: '#ef4444' }
                            ]
                        }
                    });

                    const ctxGuru = document.getElementById('guruChart').getContext('2d');
                    window.guruChartInstance = new Chart(ctxGuru, {
                        ...config,
                        data: {
                            labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum'],
                            datasets: [
                                { label: 'Hadir', data: [80, 82, 81, 83, 79], backgroundColor: '#10b981' },
