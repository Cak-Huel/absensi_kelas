<!DOCTYPE html>
<html lang="id" class="antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Siswa - Sistem Absensi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f4f4f5',
                            100: '#e4e4e7',
                            200: '#d4d4d8',
                            300: '#a1a1aa',
                            400: '#71717a',
                            500: '#52525b',
                            600: '#3f3f46',
                            700: '#27272a',
                            800: '#18181b',
                            900: '#09090b',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300 min-h-screen"
      x-data="dashboard()" x-init="initDashboard()">

    <!-- Header -->
    <header class="sticky top-0 z-40 glass shadow-sm dark:shadow-black/20">
        <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-brand-900 dark:bg-white text-white dark:text-brand-900 flex items-center justify-center shadow-lg shadow-brand-900/20">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z" />
                    </svg>
                </div>
                <span class="font-bold text-lg tracking-tight">Absensi</span>
            </div>
            
            <div class="flex items-center gap-4">
                <button @click="toggleTheme()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <svg x-show="!isDark" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
                    </svg>
                    <svg x-show="isDark" style="display: none;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-yellow-400">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
                    </svg>
                </button>
                <button @click="logout()" class="text-sm font-medium text-red-600 dark:text-red-400 hover:text-red-700 dark:hover:text-red-300 px-3 py-1.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
                    Keluar
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-3xl mx-auto px-4 py-8 space-y-6">
        
        <!-- Greeting Section -->
        <div class="mb-8">
            <p class="text-sm font-medium text-brand-500 dark:text-brand-400 uppercase tracking-wider mb-1" x-text="currentDate"></p>
            <h1 class="text-3xl font-bold">Halo, <span class="font-normal text-slate-500 dark:text-slate-400" x-text="userName">Siswa</span></h1>
        </div>

        <!-- Student Info Card -->
        <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-xl shadow-slate-200/40 dark:shadow-black/20 border border-slate-100 dark:border-slate-700/50 flex items-center gap-5 transition-transform hover:scale-[1.01] duration-300">
            <div class="w-16 h-16 rounded-full bg-gradient-to-tr from-blue-500 to-cyan-400 flex items-center justify-center text-white text-xl font-bold shadow-lg shadow-blue-500/30" x-text="getInitials()">
            </div>
            <div>
                <h3 class="font-bold text-xl mb-1" x-text="userName"></h3>
                <p class="text-sm text-slate-500 dark:text-slate-400">
                    <span x-text="studentId"></span> &bull; <span x-text="studentClass"></span>
                </p>
            </div>
        </div>

        <!-- Scan Button -->
        <button @click="openScanner" class="w-full relative overflow-hidden group bg-brand-900 hover:bg-brand-800 dark:bg-brand-100 dark:hover:bg-white text-white dark:text-brand-900 rounded-3xl p-6 shadow-xl shadow-brand-900/20 transition-all duration-300 transform hover:-translate-y-1">
            <div class="relative z-10 flex flex-col items-center justify-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" class="w-12 h-12">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 013.75 9.375v-4.5zM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 01-1.125-1.125v-4.5zM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0113.5 9.375v-4.5z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 6.75h.75v.75h-.75v-.75zM6.75 16.5h.75v.75h-.75v-.75zM16.5 6.75h.75v.75h-.75v-.75zM13.5 13.5h.75v.75h-.75v-.75zM13.5 19.5h.75v.75h-.75v-.75zM19.5 13.5h.75v.75h-.75v-.75zM19.5 19.5h.75v.75h-.75v-.75zM16.5 16.5h.75v.75h-.75v-.75z" />
                </svg>
                <span class="text-xl font-bold tracking-wide">Scan QR Absensi</span>
            </div>
            <div class="absolute inset-0 bg-white/20 dark:bg-black/10 transform -translate-x-full group-hover:translate-x-full transition-transform duration-1000 ease-in-out"></div>
        </button>

        <!-- Status Card -->
        <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-xl shadow-slate-200/40 dark:shadow-black/20 border border-slate-100 dark:border-slate-700/50">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold text-slate-600 dark:text-slate-400">Status Hari Ini</h3>
                <span class="text-sm font-medium" x-text="currentTime"></span>
            </div>
            <div class="flex items-center gap-4">
                <template x-if="!hasAttended">
                    <span class="px-4 py-2 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-full text-sm font-semibold flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-slate-400"></span> Belum Absen
                    </span>
                </template>
                <template x-if="hasAttended">
                    <div class="flex items-center gap-4 w-full">
                        <span class="px-4 py-2 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 rounded-full text-sm font-semibold flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Hadir
                        </span>
                        <span class="text-sm font-medium text-slate-500 dark:text-slate-400" x-text="attendedTime"></span>
                    </div>
                </template>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-3 gap-4">
            <div class="bg-white dark:bg-slate-800 rounded-3xl p-5 shadow-xl shadow-slate-200/40 dark:shadow-black/20 border border-slate-100 dark:border-slate-700/50 text-center">
                <div class="text-3xl font-bold text-brand-900 dark:text-white mb-1">24</div>
                <div class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Hadir</div>
            </div>
            <div class="bg-white dark:bg-slate-800 rounded-3xl p-5 shadow-xl shadow-slate-200/40 dark:shadow-black/20 border border-slate-100 dark:border-slate-700/50 text-center">
                <div class="text-3xl font-bold text-amber-500 mb-1">2</div>
                <div class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Izin</div>
            </div>
            <div class="bg-white dark:bg-slate-800 rounded-3xl p-5 shadow-xl shadow-slate-200/40 dark:shadow-black/20 border border-slate-100 dark:border-slate-700/50 text-center">
                <div class="text-3xl font-bold text-rose-500 mb-1">1</div>
                <div class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Sakit</div>
            </div>
        </div>
    </main>

    <!-- Scanner Modal Overlay -->
    <div x-show="showScanner" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm"
         x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0">
        
        <div class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-[2rem] shadow-2xl overflow-hidden flex flex-col transform transition-all"
             @click.away="closeScanner()">
            
            <div class="p-6 border-b border-slate-100 dark:border-slate-700/50 flex items-center justify-between">
                <h2 class="text-lg font-bold">Scan QR Code</h2>
                <button @click="closeScanner()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors text-slate-500">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <div class="p-6">
                <!-- Scanner View -->
                <div x-show="!scanSuccess" class="relative aspect-square bg-slate-100 dark:bg-slate-900 rounded-2xl overflow-hidden flex items-center justify-center">
                    <div class="absolute inset-10 border-2 border-brand-500 rounded-xl z-10 opacity-50"></div>
                    <!-- Simulate Camera -->
                    <div class="absolute inset-0 bg-slate-800 animate-pulse opacity-10"></div>
                    
                    <div class="text-center z-20 text-slate-500 dark:text-slate-400">
                        <svg class="w-12 h-12 mx-auto mb-3 opacity-50 animate-bounce" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
                        </svg>
                        <p class="text-sm font-medium">Mencari QR Code...</p>
                    </div>
                </div>

                <!-- Success View -->
                <div x-show="scanSuccess" style="display: none;" class="py-8 text-center"
                     x-transition:enter="transition ease-out duration-300 transform" x-transition:enter-start="opacity-0 scale-90" x-transition:enter-end="opacity-100 scale-100">
                    <div class="w-20 h-20 bg-emerald-100 dark:bg-emerald-900/40 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-10 h-10 text-emerald-500">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                        </svg>
                    </div>
                    <h3 class="text-xl font-bold mb-1">Absensi Berhasil!</h3>
                    <p class="text-slate-500 dark:text-slate-400 text-sm" x-text="`Tercatat pada ${attendedTime}`"></p>
                </div>
            </div>
            
            <div x-show="!scanSuccess" class="p-4 bg-slate-50 dark:bg-slate-900/50 text-center text-xs text-slate-500 dark:text-slate-400">
                Arahkan kamera perangkat Anda ke QR Code yang ada di kelas.
            </div>
        </div>
    </div>

    <script>
        function dashboard() {
            return {
                isDark: false,
                userName: '',
                studentId: '',
                studentClass: '',
                currentDate: '',
                currentTime: '',
                hasAttended: false,
                attendedTime: '',
                showScanner: false,
                scanSuccess: false,

                initDashboard() {
                    // Cek Auth
                    const role = localStorage.getItem('role');
                    if (role !== 'student') {
                        window.location.href = '../index.html';
                        return;
                    }

                    this.userName = localStorage.getItem('user_name') || 'Siswa';
                    this.studentId = localStorage.getItem('student_id') || '-';
                    this.studentClass = localStorage.getItem('student_class') || '-';

                    // Cek Theme Preference
                    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                        this.isDark = true;
                        document.documentElement.classList.add('dark');
                    } else {
                        this.isDark = false;
                        document.documentElement.classList.remove('dark');
                    }

                    this.updateTime();
                    setInterval(() => this.updateTime(), 60000); // update every minute
                },

                updateTime() {
                    const now = new Date();
                    const optionsDate = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                    this.currentDate = now.toLocaleDateString('id-ID', optionsDate);
                    
                    const optionsTime = { hour: '2-digit', minute: '2-digit' };
                    this.currentTime = now.toLocaleTimeString('id-ID', optionsTime) + ' WIB';
                },

                getInitials() {
                    return this.userName.substring(0, 2).toUpperCase();
                },

                toggleTheme() {
                    this.isDark = !this.isDark;
                    if (this.isDark) {
                        document.documentElement.classList.add('dark');
                        localStorage.theme = 'dark';
                    } else {
                        document.documentElement.classList.remove('dark');
                        localStorage.theme = 'light';
                    }
                },

                logout() {
                    localStorage.removeItem('role');
                    localStorage.removeItem('user_name');
                    localStorage.removeItem('student_id');
                    localStorage.removeItem('student_class');
                    window.location.href = '../index.html';
                },

                openScanner() {
                    if (this.hasAttended) return; // Kalau sudah absen, disable scanner (opsional)
                    
                    this.showScanner = true;
                    this.scanSuccess = false;

                    // Simulasi proses scanning (demo purpose)
                    setTimeout(() => {
                        if (this.showScanner) {
                            this.scanSuccess = true;
                            this.hasAttended = true;
                            
                            const now = new Date();
                            this.attendedTime = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + ' WIB';
                            
                            // Tutup modal setelah sukses
                            setTimeout(() => {
                                this.closeScanner();
                            }, 2000);
                        }
                    }, 2500);
                },

                closeScanner() {
                    this.showScanner = false;
                    setTimeout(() => {
                        this.scanSuccess = false;
                    }, 300);
                }
            }
        }
    </script>
</body>

</html>
